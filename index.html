<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game Tebak Kata Kamus - Baca definisi KBBI dan tebak katanya secepat mungkin!">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tebak Kata Kamus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-glass: rgba(17, 24, 39, 0.85);
            --bg-surface: #1e293b;
            --bg-elevated: #334155;
            --border-subtle: rgba(148, 163, 184, 0.12);
            --border-medium: rgba(148, 163, 184, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100%;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            padding: 8px;
            padding-top: calc(8px + var(--safe-area-top));
            padding-bottom: calc(8px + var(--safe-area-bottom));
            overflow: hidden;
        }

        /* Background ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== APP CONTAINER ===== */
        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            background: var(--bg-card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: calc(100dvh - 16px - var(--safe-area-top) - var(--safe-area-bottom));
            overflow: hidden;
        }

        @media (min-width: 640px) {
            #app {
                padding: 28px 32px;
                border-radius: 24px;
            }
        }

        /* ===== LETTER BOXES ===== */
        .letter-box {
            width: 2rem;
            height: 2.4rem;
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid var(--border-medium);
            background: var(--bg-surface);
            text-transform: uppercase;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
        }

        @media (min-width: 380px) {
            .letter-box {
                width: 2.3rem;
                height: 2.7rem;
                font-size: 1.2rem;
            }
        }

        @media (min-width: 640px) {
            .letter-box {
                width: 3rem;
                height: 3.2rem;
                font-size: 1.5rem;
                border-radius: 12px;
            }
        }

        .letter-box.active {
            border-color: var(--accent-blue);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.4), 0 0 4px rgba(59, 130, 246, 0.2) inset;
            transform: scale(1.08);
        }

        .letter-box.correct {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-color: #22c55e;
            color: white;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }

        .letter-box.wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(3px); }
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-35px) scale(1.3); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.2); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @keyframes emoji-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .animate-pop { animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-shake { animation: shake 0.35s ease-in-out; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }

        .time-bonus {
            position: absolute;
            color: var(--accent-emerald);
            font-weight: 800;
            font-size: 1.25rem;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .timer-critical {
            color: var(--wrong-color) !important;
            animation: pulse-glow 1s ease-in-out infinite;
            border-radius: 8px;
            padding: 2px 6px;
        }

        /* ===== KEYBOARD ===== */
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 3px;
        }

        @media (min-width: 640px) {
            .keyboard-row { gap: 5px; margin-bottom: 5px; }
        }

        .key {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            min-width: 0;
            flex: 1;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .key {
                font-size: 1rem;
                height: 50px;
                border-radius: 10px;
            }
        }

        .key:active {
            background: #475569;
            transform: scale(0.93);
        }

        .key::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            border-radius: inherit;
            pointer-events: none;
        }

        .key-backspace {
            flex: 1.5;
            background: #4a2332;
            border-color: rgba(244, 63, 94, 0.2);
            color: #fda4af;
            font-size: 1.1rem;
        }

        .key-backspace:active {
            background: #6b2140;
        }

        /* ===== CLUE BOX ===== */
        .clue-box {
            width: 100%;
            max-width: 520px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid var(--border-subtle);
            max-height: 100px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        @media (min-width: 640px) {
            .clue-box {
                padding: 18px 22px;
                max-height: 130px;
                border-radius: 16px;
                margin-bottom: 20px;
            }
        }

        .clue-box::-webkit-scrollbar { width: 4px; }
        .clue-box::-webkit-scrollbar-track { background: transparent; }
        .clue-box::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ===== MENU BUTTONS ===== */
        .btn-mode {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.15rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .btn-mode::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent 60%);
            pointer-events: none;
        }

        .btn-mode:active { transform: scale(0.97); }

        .btn-easy {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }
        .btn-easy:hover { box-shadow: 0 8px 32px rgba(59, 130, 246, 0.45); }

        .btn-hard {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.3);
        }
        .btn-hard:hover { box-shadow: 0 8px 32px rgba(244, 63, 94, 0.45); }

        .btn-subtitle {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .btn-retry {
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
            border: 1px solid var(--border-medium);
        }

        .btn-retry:active { transform: scale(0.95); }
        .btn-retry:hover { background: var(--bg-elevated); }

        /* ===== HEADER BAR ===== */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        @media (min-width: 640px) {
            .game-header {
                padding-bottom: 16px;
                margin-bottom: 16px;
            }
        }

        .header-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .timer-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-amber);
            transition: color 0.3s;
            line-height: 1;
        }

        @media (min-width: 640px) {
            .timer-value { font-size: 2rem; }
        }

        .counter-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-emerald);
            line-height: 1;
        }

        @media (min-width: 640px) {
            .counter-value { font-size: 1.4rem; }
        }

        /* ===== WORD CONTAINER ===== */
        .word-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
            min-height: 50px;
            align-items: center;
        }

        @media (min-width: 640px) {
            .word-container {
                gap: 6px;
                margin-bottom: 24px;
                min-height: 60px;
            }
        }

        /* ===== RESULT SCREEN ===== */
        .result-container {
            text-align: center;
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .result-emoji {
            font-size: 3.5rem;
            margin-bottom: 12px;
            animation: emoji-bounce 2s ease-in-out infinite;
            line-height: 1;
        }

        @media (min-width: 640px) {
            .result-emoji { font-size: 4.5rem; }
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .result-title { font-size: 2rem; }
        }

        .result-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-width: 380px;
            margin: 0 auto 8px;
            line-height: 1.6;
            font-style: italic;
        }

        @media (min-width: 640px) {
            .result-message { font-size: 1rem; }
        }

        .result-stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .answer-reveal {
            display: inline-block;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            border-radius: 12px;
            padding: 8px 20px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            margin: 8px 0 16px;
        }

        /* ===== MENU SCREEN ===== */
        .menu-container {
            text-align: center;
            width: 100%;
            padding: 24px 0;
        }

        .menu-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .menu-title { font-size: 2.8rem; }
        }

        .menu-subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 32px;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        @media (min-width: 640px) {
            .menu-subtitle { font-size: 0.95rem; }
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 340px;
            margin: 0 auto;
        }

        /* Mode badge / pill */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
            z-index: 100;
            pointer-events: none;
        }

        /* ===== CLUE TAG ===== */
        .clue-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            margin-bottom: 6px;
        }

        .clue-tag svg { width: 14px; height: 14px; }

        .clue-text {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.55;
        }

        @media (min-width: 640px) {
            .clue-text { font-size: 1rem; }
        }
    
.shake-screen {
    animation: screenShake 4s infinite;
}
@keyframes screenShake {
    0% { transform: translate(0, 0); }
    5% { transform: translate(-2px, 1px); }
    10% { transform: translate(2px, -2px); }
    15% { transform: translate(-3px, 0); }
    20% { transform: translate(0, 0); }
    100% { transform: translate(0, 0); }
}
.timer-fire {
    color: #ef4444 !important;
    text-shadow: 0 -2px 4px #dc2626, 0 -4px 10px #f97316, 0 -8px 20px #fbbf24 !important;
    animation: burn 0.3s infinite alternate;
}
@keyframes burn {
    0% { transform: scale(1); text-shadow: 0 -2px 4px #dc2626, 0 -4px 10px #f97316; }
    100% { transform: scale(1.1); text-shadow: 0 -4px 8px #dc2626, 0 -8px 15px #f97316, 0 -12px 25px #fbbf24; }
}

.heaven-container {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 9999;
    pointer-events: none;
    overflow: hidden;
}
.gate {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(to bottom, #fdfbfb, #ebedee);
    border: 8px solid #fbbf24;
    transition: transform 4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 0 50px rgba(251, 191, 36, 0.4), 0 0 30px rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
}
.left-gate { left: 0; transform-origin: left; border-right: 4px solid #f59e0b; }
.right-gate { right: 0; transform-origin: right; border-left: 4px solid #f59e0b; }

.heaven-light {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    background: radial-gradient(circle, #ffffff 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    transition: opacity 2s ease-in-out, width 4s, height 4s;
    z-index: -1;
}

.gates-open .left-gate { transform: translateX(-100%); }
.gates-open .right-gate { transform: translateX(100%); }
.gates-open .heaven-light { opacity: 1; width: 200vw; height: 200vh; }
</style>
</head>

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function pickRandom(arr) {

    function spawnConfetti() {
        const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6'];
        for (let i = 0; i < 50; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            piece.style.animationDelay = (Math.random() * 0.8) + 's';
            piece.style.width = (Math.random() * 6 + 4) + 'px';
            piece.style.height = (Math.random() * 6 + 4) + 'px';
            document.body.appendChild(piece);
            setTimeout(() => piece.remove(), 4000);
        }
    }

                statsHtml = `
                    <p class="result-stats" style="color: #fca5a5;">Cuma bisa jawab ${currentWordIndex} dari ${TOTAL_WORDS} kata di mode NERAKA. Lemah.</p>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 4px;">Kata yang gagal kau tebak:</p>
                    <div class="answer-reveal" style="color: #ef4444; border-color: #ef4444;">${currentWord}</div>
                `;
            }
        }
        appDiv.innerHTML = `
            <div class="result-container animate-fade-in-up">
                <div class="result-emoji">${emoji}</div>
                <h1 class="result-title" style="${titleColor}">${title}</h1>
                <p class="result-message">"${message}"</p>
                ${statsHtml}
                <button id="btn-retry" onclick="renderMenu()" class="btn-retry">
                    🔄 Main Lagi
                </button>
            </div>
        `;
    }

    function startGame(mode) {
        currentMode = mode;
        
        if (mode === 'easy') { TOTAL_WORDS = 10; }
        else if (mode === 'hard') { TOTAL_WORDS = 12; }
        else if (mode === 'hell') { TOTAL_WORDS = 15; }
        else if (mode === 'judgment') { TOTAL_WORDS = 20; }

        let dict = dictionaryEasy;
        let pool = easyPool;
        if (mode === 'hard') { dict = dictionaryHard; pool = hardPool; }
        if (mode === 'hell') { dict = dictionaryHell; pool = hellPool; }
        
        if (mode === 'judgment') {
            let comboDict = dictionaryEasy.concat(dictionaryHard, dictionaryHell);
            comboDict = shuffleArray(comboDict);
            let mixedPool = shuffleArray(dictionaryJudgment).slice(0, 7).concat(comboDict.slice(0, 13));
            targetQuestions = shuffleArray(mixedPool);
        } else {
            if (pool.length < TOTAL_WORDS) {
                pool = shuffleArray(dict);
            }
            targetQuestions = pool.splice(-TOTAL_WORDS, TOTAL_WORDS);
            if (mode === 'easy') { easyPool = pool; localStorage.setItem('easyPool', JSON.stringify(pool)); }
            else if (mode === 'hard') { hardPool = pool; localStorage.setItem('hardPool', JSON.stringify(pool)); }
            else if (mode === 'hell') { hellPool = pool; localStorage.setItem('hellPool', JSON.stringify(pool)); }
        }

        currentWordIndex = 0;

        if (mode === 'easy') { timeLeft = 60; bonusTime = 3; }
        else if (mode === 'hard') { timeLeft = 90; bonusTime = 2; }
        else if (mode === 'hell') { timeLeft = 180; bonusTime = 1; }
        else if (mode === 'judgment') { timeLeft = 150; bonusTime = 0; }

        state = 'playing';

        if (mode === 'judgment') {
            document.body.classList.add('shake-screen');
        } else {
            document.body.classList.remove('shake-screen');
        }

        renderGameUI();
        updateTimerDisplay();
        loadWord();

        clearInterval(timerInterval);

        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            
            if (currentMode === 'judgment') {
                const timerDisplay = document.getElementById('timer-display');
                if (timerDisplay && Math.random() < 0.1) {
                    timerDisplay.classList.add('timer-fire');
                    setTimeout(() => timerDisplay.classList.remove('timer-fire'), 800);
                }
            }

            if (timeLeft <= 0) {
                renderResult(false);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerDisplay = document.getElementById('timer-display');
        if (!timerDisplay) return;

        timerDisplay.innerText = formatTime(timeLeft);

        if (timeLeft <= 10) {
            timerDisplay.classList.add('timer-critical');
        } else {
            timerDisplay.classList.remove('timer-critical');
            timerDisplay.style.color = 'var(--accent-amber)';
        }
    }

    function showTimeBonus() {
        timeLeft += bonusTime;
        updateTimerDisplay();

        // Flash green
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) {
            timerDisplay.style.color = 'var(--accent-emerald)';
            setTimeout(() => {
                if (timeLeft > 10) {
                    timerDisplay.style.color = 'var(--accent-amber)';
                }
            }, 500);
        }

        // Float animation
        const anim = document.getElementById('bonus-anim');
        if (anim) {
            anim.innerText = `+${bonusTime}`;
            anim.style.display = 'block';
            anim.style.animation = 'none';
            anim.offsetHeight; /* trigger reflow */
            anim.style.animation = 'floatUp 1s ease-out forwards';

            setTimeout(() => {
                anim.style.display = 'none';
            }, 1000);
        }
    }


    function syncHiddenInput() {
        const hiddenInput = document.getElementById('hidden-input');
        if (hiddenInput) {
            hiddenInput.value = currentWord.substring(0, boxIndex);
        }
    }

    function loadWord() {
        currentWord = targetQuestions[currentWordIndex].w;
        currentClue = targetQuestions[currentWordIndex].c;
        boxIndex = 0;

        document.getElementById('word-counter').innerText = currentWordIndex + 1;
        document.getElementById('clue-text').innerText = currentClue;

        const container = document.getElementById('word-container');
        container.innerHTML = '';
        boxElements = [];

        for (let i = 0; i < currentWord.length; i++) {
            const box = document.createElement('div');
            box.className = 'letter-box';
            if (i === 0) box.classList.add('active');
            container.appendChild(box);
            boxElements.push(box);
        }
        syncHiddenInput();
        const hiddenInput = document.getElementById('hidden-input');
        if (hiddenInput) hiddenInput.focus();
    }

    function handleKeyClick(letter) {
        if (state !== 'playing' || boxIndex >= currentWord.length) return;

        const targetLetter = currentWord[boxIndex];
        const currentBox = boxElements[boxIndex];

        // Reset animations
        currentBox.classList.remove('animate-pop', 'animate-shake');
        void currentBox.offsetWidth; // Trigger reflow

        currentBox.innerText = letter;

        if (letter === targetLetter) {
            currentBox.classList.remove('active', 'wrong');
            currentBox.classList.add('correct', 'animate-pop');

            boxIndex++;

            if (boxIndex === currentWord.length) {
                showTimeBonus();

                setTimeout(() => {
                    currentWordIndex++;
                    if (currentWordIndex >= TOTAL_WORDS) {
                        renderResult(true);
                    } else {
                        loadWord();
                    }
                }, 450);
            } else {
                boxElements[boxIndex].classList.add('active');
            }
        } else {
            currentBox.classList.remove('active');
            currentBox.classList.add('wrong', 'animate-shake');
            
            // NERAKA PENALTY
            if (currentMode === 'hell' || currentMode === 'judgment') {
                const pen = currentMode === 'hell' ? 2 : 5;
                timeLeft -= pen;
                if (timeLeft < 0) timeLeft = 0;
                updateTimerDisplay();
                
                const timerDisplay = document.getElementById('timer-display');
                if (timerDisplay) {
                    timerDisplay.style.color = '#e11d48'; // accent-rose
                    setTimeout(() => {
                        if (timeLeft > 10) {
                            timerDisplay.style.color = 'var(--accent-amber)';
                        } else {
                            timerDisplay.style.color = ''; // will fallback to timer-critical class color
                        }
                    }, 300);
                }
                
                if (timeLeft <= 0) {
                    setTimeout(() => {
                        renderResult(false);
                    }, 100);
                }
            }
        }
        syncHiddenInput();
    }

    function handleBackspaceClick() {
        if (state !== 'playing' || boxIndex >= currentWord.length) return;

        const currentBox = boxElements[boxIndex];

        if (currentBox.classList.contains('wrong')) {
            currentBox.innerText = '';
            currentBox.classList.remove('wrong', 'animate-shake');
            currentBox.classList.add('active');
        }
        syncHiddenInput();
    }

    // --- EVENT LISTENERS ---
    
    // PC physical keyboard support
    window.addEventListener('keydown', (e) => {
        if (state !== 'playing') return;
        
        const key = e.key.toUpperCase();
        if (/^[A-Z]$/.test(key)) {
            e.preventDefault();
            handleKeyClick(key);
        } else if (key === 'BACKSPACE') {
            e.preventDefault();
            handleBackspaceClick();
        }
    });

    // Mobile input support
    document.addEventListener('input', (e) => {
        if (e.target && e.target.id === 'hidden-input') {
            if (state !== 'playing') return;
            
            const val = e.target.value.toUpperCase();
            
            if (val.length > boxIndex) {
                // Typed
                const char = val.charAt(val.length - 1);
                if (/^[A-Z]$/.test(char)) {
                    handleKeyClick(char);
                } else {
                    syncHiddenInput(); // invalid char, reset
                }
            } else if (val.length < boxIndex) {
                // Backspace
                handleBackspaceClick();
            }
        }
    });

    // Prevent zoom on double tap (mobile)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, false);

    // Initialize UI
    renderMenu();
</script>
</body>
</html>
