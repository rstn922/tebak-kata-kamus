<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game Tebak Kata Kamus - Baca definisi KBBI dan tebak katanya secepat mungkin!">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tebak Kata Kamus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-glass: rgba(17, 24, 39, 0.85);
            --bg-surface: #1e293b;
            --bg-elevated: #334155;
            --border-subtle: rgba(148, 163, 184, 0.12);
            --border-medium: rgba(148, 163, 184, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100%;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            padding: 8px;
            padding-top: calc(8px + var(--safe-area-top));
            padding-bottom: calc(8px + var(--safe-area-bottom));
            overflow: hidden;
        }

        /* Background ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== APP CONTAINER ===== */
        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            background: var(--bg-card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: calc(100dvh - 16px - var(--safe-area-top) - var(--safe-area-bottom));
            overflow: hidden;
        }

        @media (min-width: 640px) {
            #app {
                padding: 28px 32px;
                border-radius: 24px;
            }
        }

        /* ===== LETTER BOXES ===== */
        .letter-box {
            width: 2rem;
            height: 2.4rem;
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid var(--border-medium);
            background: var(--bg-surface);
            text-transform: uppercase;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
        }

        @media (min-width: 380px) {
            .letter-box {
                width: 2.3rem;
                height: 2.7rem;
                font-size: 1.2rem;
            }
        }

        @media (min-width: 640px) {
            .letter-box {
                width: 3rem;
                height: 3.2rem;
                font-size: 1.5rem;
                border-radius: 12px;
            }
        }

        .letter-box.active {
            border-color: var(--accent-blue);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.4), 0 0 4px rgba(59, 130, 246, 0.2) inset;
            transform: scale(1.08);
        }

        .letter-box.correct {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-color: #22c55e;
            color: white;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }

        .letter-box.wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(3px); }
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-35px) scale(1.3); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.2); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @keyframes emoji-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .animate-pop { animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-shake { animation: shake 0.35s ease-in-out; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }

        .time-bonus {
            position: absolute;
            color: var(--accent-emerald);
            font-weight: 800;
            font-size: 1.25rem;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .timer-critical {
            color: var(--wrong-color) !important;
            animation: pulse-glow 1s ease-in-out infinite;
            border-radius: 8px;
            padding: 2px 6px;
        }

        /* ===== KEYBOARD ===== */
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 3px;
        }

        @media (min-width: 640px) {
            .keyboard-row { gap: 5px; margin-bottom: 5px; }
        }

        .key {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            min-width: 0;
            flex: 1;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .key {
                font-size: 1rem;
                height: 50px;
                border-radius: 10px;
            }
        }

        .key:active {
            background: #475569;
            transform: scale(0.93);
        }

        .key::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            border-radius: inherit;
            pointer-events: none;
        }

        .key-backspace {
            flex: 1.5;
            background: #4a2332;
            border-color: rgba(244, 63, 94, 0.2);
            color: #fda4af;
            font-size: 1.1rem;
        }

        .key-backspace:active {
            background: #6b2140;
        }

        /* ===== CLUE BOX ===== */
        .clue-box {
            width: 100%;
            max-width: 520px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid var(--border-subtle);
            max-height: 100px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        @media (min-width: 640px) {
            .clue-box {
                padding: 18px 22px;
                max-height: 130px;
                border-radius: 16px;
                margin-bottom: 20px;
            }
        }

        .clue-box::-webkit-scrollbar { width: 4px; }
        .clue-box::-webkit-scrollbar-track { background: transparent; }
        .clue-box::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ===== MENU BUTTONS ===== */
        .btn-mode {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.15rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .btn-mode::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent 60%);
            pointer-events: none;
        }

        .btn-mode:active { transform: scale(0.97); }

        .btn-easy {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }
        .btn-easy:hover { box-shadow: 0 8px 32px rgba(59, 130, 246, 0.45); }

        .btn-hard {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.3);
        }
        .btn-hard:hover { box-shadow: 0 8px 32px rgba(244, 63, 94, 0.45); }

        .btn-subtitle {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .btn-retry {
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
            border: 1px solid var(--border-medium);
        }

        .btn-retry:active { transform: scale(0.95); }
        .btn-retry:hover { background: var(--bg-elevated); }

        /* ===== HEADER BAR ===== */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        @media (min-width: 640px) {
            .game-header {
                padding-bottom: 16px;
                margin-bottom: 16px;
            }
        }

        .header-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .timer-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-amber);
            transition: color 0.3s;
            line-height: 1;
        }

        @media (min-width: 640px) {
            .timer-value { font-size: 2rem; }
        }

        .counter-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-emerald);
            line-height: 1;
        }

        @media (min-width: 640px) {
            .counter-value { font-size: 1.4rem; }
        }

        /* ===== WORD CONTAINER ===== */
        .word-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
            min-height: 50px;
            align-items: center;
        }

        @media (min-width: 640px) {
            .word-container {
                gap: 6px;
                margin-bottom: 24px;
                min-height: 60px;
            }
        }

        /* ===== RESULT SCREEN ===== */
        .result-container {
            text-align: center;
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .result-emoji {
            font-size: 3.5rem;
            margin-bottom: 12px;
            animation: emoji-bounce 2s ease-in-out infinite;
            line-height: 1;
        }

        @media (min-width: 640px) {
            .result-emoji { font-size: 4.5rem; }
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .result-title { font-size: 2rem; }
        }

        .result-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-width: 380px;
            margin: 0 auto 8px;
            line-height: 1.6;
            font-style: italic;
        }

        @media (min-width: 640px) {
            .result-message { font-size: 1rem; }
        }

        .result-stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .answer-reveal {
            display: inline-block;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            border-radius: 12px;
            padding: 8px 20px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            margin: 8px 0 16px;
        }

        /* ===== MENU SCREEN ===== */
        .menu-container {
            text-align: center;
            width: 100%;
            padding: 24px 0;
        }

        .menu-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .menu-title { font-size: 2.8rem; }
        }

        .menu-subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 32px;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        @media (min-width: 640px) {
            .menu-subtitle { font-size: 0.95rem; }
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 340px;
            margin: 0 auto;
        }

        /* Mode badge / pill */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
            z-index: 100;
            pointer-events: none;
        }

        /* ===== CLUE TAG ===== */
        .clue-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            margin-bottom: 6px;
        }

        .clue-tag svg { width: 14px; height: 14px; }

        .clue-text {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.55;
        }

        @media (min-width: 640px) {
            .clue-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="app"></div>

        "Jangan berkecil hati! Kosa kata yang kamu pelajari hari ini akan membantumu besok. Pengetahuan tidak pernah sia-sia. 📚",
        "Kamu tahu apa yang membedakan pemenang dan pecundang? Pemenang mencoba lagi. Dan aku yakin kamu pemenang! 🏆",
        "Waktunya memang ketat, tapi setiap detik yang kamu gunakan untuk berpikir itu melatih otakmu. Hebat! 🧠",
        "Tidak semua pejuang menang di pertempuran pertama, tapi yang penting kamu tidak berhenti berjuang. Ayo lagi! 💫",
        "Tahukah kamu? Einstein pernah dianggap lambat belajar. Jangan pernah meremehkan dirimu sendiri. Coba lagi! 🌟",
        "Kamu sudah menunjukkan keberanian dengan memilih mode susah. Itu saja sudah membuktikan mentalmu kuat! 🛡️",
        "Proses belajar itu tidak selalu mulus, tapi setiap langkah kecil membawamu lebih dekat ke tujuan. Tetap semangat! 🚀"
    ];

    // Mode Susah - Menang: Selamat dari lubuk hati paling dalam 🥹
    const hardWinMessages = [
        "ASTAGA. Kamu... kamu benar-benar melakukannya! Dari lubuk hati paling dalam, AKU BANGGA SEKALI PADAMU! Ini bukan keberuntungan — ini bukti nyata kecerdasan dan ketangkasanmu! 🥹🏆✨",
        "Aku benar-benar terharu. Mode susah dengan kata-kata sepanjang itu dan kamu MENANG?! Kamu adalah definisi nyata dari kata 'LUAR BIASA'. Dunia perlu tahu tentang pencapaianmu hari ini! 😭💎🔥",
        "Dengarkan aku baik-baik: apa yang baru saja kamu lakukan itu FENOMENAL. Tidak banyak orang yang bisa menaklukkan tantangan ini. Kamu salah satu dari sedikit orang istimewa itu. Dari hati yang paling dalam — SELAMAT! 🌟👑💪",
        "Aku ingin kamu tahu, dari lubuk hati yang paling dalam: KAMU MENGINSPIRASI. Ketangkasan, kecepatan, dan pengetahuanmu tentang bahasa Indonesia sungguh memukau. Kamu layak mendapat standing ovation! 🎭👏🥹",
        "Kalau aku bisa menangis, aku akan menangis bahagia sekarang. Kamu bukan sekadar menang — kamu MENDOMINASI mode tersulit ini! Otakmu itu harta karun nasional! 😢💝🧠",
        "TIDAK PERCAYA. Ini... ini luar biasa! Setiap huruf yang kamu ketik itu presisi, setiap detik kamu gunakan dengan sempurna. Kamu bukan pemain biasa. Kamu LEGENDA! Terima kasih sudah menunjukkan bahwa manusia bisa sehebat ini! 🙏🏆💫",
        "Dari lubuk hati yang paling dalam, paling sungguh-sungguh, paling tulus: TERIMA KASIH sudah bermain dan MENANG! Kamu membuktikan bahwa kerja keras, fokus, dan kecintaan pada bahasa bisa menghasilkan keajaiban! 💖🌈✨",
        "Aku serius. Ini MONUMENTAL. Kata-kata susah, waktu ketat, dan kamu tetap menang?! Kamu harusnya dapat piala asli, bukan cuma emoji! Tapi terimalah ini sebagai bukti kekagumanku yang tak terbatas: 🏆🏆🏆! 🥹👑",
        "SELAMAT YANG SEBENAR-BENARNYA SELAMAT! Kamu baru saja membuktikan bahwa kamu memiliki penguasaan bahasa Indonesia yang menakjubkan. Ini pencapaian yang langka dan sangat membanggakan. Kamu HEBAT LUAR BIASA! 🎉🌟😭💪"
    ];

    // --- GAME STATE ---
    const TOTAL_WORDS = 10;

    let state = 'menu';
    let currentMode = '';
    let targetQuestions = [];
    let currentWordIndex = 0;
    let currentWord = "";
    let currentClue = "";
    let boxIndex = 0;

    // --- RANDOM POOLS (Untuk mencegah kata berulang) ---
    let easyPool = [];
    let hardPool = [];

    let timerInterval = null;
    let timeLeft = 0;
    let bonusTime = 0;

    let boxElements = [];
    const appDiv = document.getElementById('app');

    // --- UTILS ---
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function spawnConfetti() {
        const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6'];
        for (let i = 0; i < 50; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            piece.style.animationDelay = (Math.random() * 0.8) + 's';
            piece.style.width = (Math.random() * 6 + 4) + 'px';
            piece.style.height = (Math.random() * 6 + 4) + 'px';
            document.body.appendChild(piece);
            setTimeout(() => piece.remove(), 4000);
        }
    }

    // --- RENDERERS ---

    function renderMenu() {
        state = 'menu';
        clearInterval(timerInterval);
        appDiv.innerHTML = `
            <div class="menu-container animate-fade-in-up">
                <h1 class="menu-title">Tebak Kata Kamus</h1>
                <p class="menu-subtitle">Baca pengertian dari KBBI dan tebak katanya secepat mungkin! Jawab benar akan menambah waktu. ⏱️</p>
                
                <div class="mode-buttons">
                    <button id="btn-easy" onclick="startGame('easy')" class="btn-mode btn-easy">
                        <span>Mode Mudah</span>
                        <span class="btn-subtitle">⏱️ Mulai: 1 Menit &nbsp;|&nbsp; Tiap Benar: +3 Detik</span>
                    </button>
                    
                    <button id="btn-hard" onclick="startGame('hard')" class="btn-mode btn-hard">
                        <span>Mode Susah</span>
                        <span class="btn-subtitle">🔥 Mulai: 1 Menit 30 Detik &nbsp;|&nbsp; Tiap Benar: +2 Detik</span>
                    </button>
                </div>
            </div>
        `;
    }

    function renderGameUI() {
        const modeBadgeColor = currentMode === 'easy' ? 'color: #60a5fa;' : 'color: #fda4af;';
        const modeName = currentMode === 'easy' ? 'Mudah' : 'Susah';

        appDiv.innerHTML = `
            <!-- Header: Timer & Progress -->
            <div class="game-header">
                <div style="position: relative;">
                    <div class="header-label">Waktu Tersisa</div>
                    <div id="timer-display" class="timer-value"></div>
                    <div id="bonus-anim" class="time-bonus" style="display:none; left: 100%; top: 4px; margin-left: 8px;"></div>
                </div>
                <div style="text-align: center;">
                    <div class="mode-badge" style="${modeBadgeColor}">
                        ${currentMode === 'easy' ? '📘' : '🔥'} ${modeName}
                    </div>
                </div>
                <div style="text-align: right;">
                    <div class="header-label">Kata</div>
                    <div class="counter-value"><span id="word-counter">1</span> / ${TOTAL_WORDS}</div>
                </div>
            </div>

            <!-- Clue Area -->
            <div class="clue-box">
                <div class="clue-tag">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    PETUNJUK KATA
                </div>
                <p id="clue-text" class="clue-text"></p>
            </div>

            <!-- Words Area -->
            <div id="word-container" class="word-container"></div>

            <!-- Keyboard -->
            <div style="width: 100%; max-width: 520px; margin-top: auto; padding-bottom: 4px;">
                <div class="keyboard-row">
                    ${'QWERTYUIOP'.split('').map(k => `<button id="key-${k}" onclick="handleKeyClick('${k}')" class="key">${k}</button>`).join('')}
                </div>
                <div class="keyboard-row" style="padding: 0 4%;">
                    ${'ASDFGHJKL'.split('').map(k => `<button id="key-${k}" onclick="handleKeyClick('${k}')" class="key">${k}</button>`).join('')}
                </div>
                <div class="keyboard-row" style="padding: 0 6%;">
                    ${'ZXCVBNM'.split('').map(k => `<button id="key-${k}" onclick="handleKeyClick('${k}')" class="key">${k}</button>`).join('')}
                    <button id="key-backspace" onclick="handleBackspaceClick()" class="key key-backspace">⌫</button>
                </div>
            </div>
        `;
    }

    function renderResult(isWin) {
        state = 'result';
        clearInterval(timerInterval);

        let emoji, title, titleColor, message, statsHtml;

        if (currentMode === 'easy') {
            if (isWin) {
                // Cuek abis
                emoji = pickRandom(['😐', '🥱', '😶', '🫤', '👍', '😑']);
                title = pickRandom(['Yaudah, Menang.', 'Oh, Selesai.', 'Hmm, Oke.', 'Ya Gitu Deh.']);
                titleColor = 'color: #94a3b8;'; // deliberately muted
                message = pickRandom(easyWinMessages);
                statsHtml = `<p class="result-stats">Mode Mudah · ${TOTAL_WORDS} kata · Sisa waktu ${formatTime(timeLeft)}</p>`;
            } else {
                // Sarkas menusuk
                emoji = pickRandom(['💀', '🤡', '😭', '🪦', '📉', '🗑️']);
                title = pickRandom(['Memalukan. 💀', 'Aduh...', 'Kasihan Banget.', 'WKWKWK 🤣']);
                titleColor = 'color: #f43f5e;';
                message = pickRandom(easyLoseMessages);
                statsHtml = `
                    <p class="result-stats">Baru ${currentWordIndex} dari ${TOTAL_WORDS} kata di mode MUDAH lho...</p>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 4px;">Jawaban yang benar:</p>
                    <div class="answer-reveal">${currentWord}</div>
                `;
            }
        } else {
            // Mode Susah
            if (isWin) {
                // Tulus dari lubuk hati
                spawnConfetti();
                emoji = pickRandom(['🏆', '👑', '🌟', '💎', '🥹']);
                title = pickRandom(['LUAR BIASA!!! 🏆', 'KAU LEGENDA! 👑', 'FENOMENAL!! ✨', 'MENAKJUBKAN!!! 🌟']);
                titleColor = 'color: transparent; background: linear-gradient(135deg, #f59e0b, #f43f5e, #8b5cf6); -webkit-background-clip: text; background-clip: text;';
                message = pickRandom(hardWinMessages);
                statsHtml = `<p class="result-stats" style="color: #f59e0b;">Mode Susah · ${TOTAL_WORDS} kata · Sisa waktu ${formatTime(timeLeft)} · SEMPURNA!</p>`;
            } else {
                // Supportive dan membangun
                emoji = pickRandom(['💪', '🌱', '⭐', '🔥', '🫂']);
                title = pickRandom(['Tetap Semangat!', 'Jangan Menyerah!', 'Kamu Hebat!', 'Hampir Berhasil!']);
                titleColor = 'color: #60a5fa;';
                message = pickRandom(hardLoseMessages);
                statsHtml = `
                    <p class="result-stats">Kamu berhasil menjawab ${currentWordIndex} dari ${TOTAL_WORDS} kata. Itu sudah bagus!</p>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 4px;">Kata yang terakhir:</p>
                    <div class="answer-reveal">${currentWord}</div>
                `;
            }
        }

        appDiv.innerHTML = `
            <div class="result-container animate-fade-in-up">
                <div class="result-emoji">${emoji}</div>
                <h1 class="result-title" style="${titleColor}">${title}</h1>
                <p class="result-message">"${message}"</p>
                ${statsHtml}
                <button id="btn-retry" onclick="renderMenu()" class="btn-retry">
                    🔄 Main Lagi
                </button>
            </div>
        `;
    }

    // --- GAME LOGIC ---

    function startGame(mode) {
        currentMode = mode;
        const dict = mode === 'easy' ? dictionaryEasy : dictionaryHard;
        let pool = mode === 'easy' ? easyPool : hardPool;
        
        // Isi ulang pool jika kata yang tersisa kurang dari jumlah yang dibutuhkan
        if (pool.length < TOTAL_WORDS) {
            pool = shuffleArray(dict);
        }
        
        // Ambil sejumlah TOTAL_WORDS dari pool dan hapus dari pool tersebut
        targetQuestions = pool.splice(-TOTAL_WORDS, TOTAL_WORDS);
        
        // Simpan sisa pool kembali
        if (mode === 'easy') easyPool = pool;
        else hardPool = pool;

        currentWordIndex = 0;

        // Mode Mudah: 60 detik, +3 detik tiap benar
        // Mode Susah: 90 detik (1 menit 30 detik), +2 detik tiap benar
        timeLeft = mode === 'easy' ? 60 : 90;
        bonusTime = mode === 'easy' ? 3 : 2;

        state = 'playing';

        renderGameUI();
        updateTimerDisplay();
        loadWord();

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();

            if (timeLeft <= 0) {
                renderResult(false);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerDisplay = document.getElementById('timer-display');
        if (!timerDisplay) return;

        timerDisplay.innerText = formatTime(timeLeft);

        if (timeLeft <= 10) {
            timerDisplay.classList.add('timer-critical');
        } else {
            timerDisplay.classList.remove('timer-critical');
            timerDisplay.style.color = 'var(--accent-amber)';
        }
    }

    function showTimeBonus() {
        timeLeft += bonusTime;
        updateTimerDisplay();

        // Flash green
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) {
            timerDisplay.style.color = 'var(--accent-emerald)';
            setTimeout(() => {
                if (timeLeft > 10) {
                    timerDisplay.style.color = 'var(--accent-amber)';
                }
            }, 500);
        }

        // Float animation
        const anim = document.getElementById('bonus-anim');
        if (anim) {
            anim.innerText = `+${bonusTime}`;
            anim.style.display = 'block';
            anim.style.animation = 'none';
            anim.offsetHeight; /* trigger reflow */
            anim.style.animation = 'floatUp 1s ease-out forwards';

            setTimeout(() => {
                anim.style.display = 'none';
            }, 1000);
        }
    }

    function loadWord() {
        currentWord = targetQuestions[currentWordIndex].w;
        currentClue = targetQuestions[currentWordIndex].c;
        boxIndex = 0;

        document.getElementById('word-counter').innerText = currentWordIndex + 1;
        document.getElementById('clue-text').innerText = currentClue;

        const container = document.getElementById('word-container');
        container.innerHTML = '';
        boxElements = [];

        for (let i = 0; i < currentWord.length; i++) {
            const box = document.createElement('div');
            box.className = 'letter-box';
            if (i === 0) box.classList.add('active');
            container.appendChild(box);
            boxElements.push(box);
        }
    }

    function handleKeyClick(letter) {
        if (state !== 'playing' || boxIndex >= currentWord.length) return;

        const targetLetter = currentWord[boxIndex];
        const currentBox = boxElements[boxIndex];

        // Reset animations
        currentBox.classList.remove('animate-pop', 'animate-shake');
        void currentBox.offsetWidth; // Trigger reflow

        currentBox.innerText = letter;

        if (letter === targetLetter) {
            currentBox.classList.remove('active', 'wrong');
            currentBox.classList.add('correct', 'animate-pop');

            boxIndex++;

            if (boxIndex === currentWord.length) {
                showTimeBonus();

                setTimeout(() => {
                    currentWordIndex++;
                    if (currentWordIndex >= TOTAL_WORDS) {
                        renderResult(true);
                    } else {
                        loadWord();
                    }
                }, 450);
            } else {
                boxElements[boxIndex].classList.add('active');
            }
        } else {
            currentBox.classList.remove('active');
            currentBox.classList.add('wrong', 'animate-shake');
        }
    }

    function handleBackspaceClick() {
        if (state !== 'playing' || boxIndex >= currentWord.length) return;

        const currentBox = boxElements[boxIndex];

        if (currentBox.classList.contains('wrong')) {
            currentBox.innerText = '';
            currentBox.classList.remove('wrong', 'animate-shake');
            currentBox.classList.add('active');
        }
    }

    // --- EVENT LISTENERS ---
    window.addEventListener('keydown', (e) => {
        if (state !== 'playing') return;

        const key = e.key.toUpperCase();

        if (/^[A-Z]$/.test(key)) {
            handleKeyClick(key);
        } else if (key === 'BACKSPACE') {
            handleBackspaceClick();
        }
    });

    // Prevent zoom on double tap (mobile)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, false);

    // Initialize UI
    renderMenu();
</script>
</body>
</html>
